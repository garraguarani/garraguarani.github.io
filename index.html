<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Garra Guaraní — Vertical Shooter Mobile del Mundial 2026.">
    <meta name="theme-color" content="#CE1126">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Garra Guaraní 🇵🇾⚽</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="game-wrapper">
        <canvas id="game-canvas"></canvas>
        <div id="hud" class="hud hidden">
            <div class="hud-top">
                <div class="hud-health">
                    <span id="hud-health-icon">❤</span>
                    <div class="hud-health-bar">
                        <div id="hud-health-fill" class="hud-health-fill"></div>
                    </div>
                </div>
                <div style="margin-right:auto;"></div>
                <div class="hud-score" id="hud-score">₲0</div>
                <button id="btn-pause" class="hud-btn" style="width:30px;height:30px;border-radius:5px;padding:0;margin-left:8px;" aria-label="Pausa">⏸</button>
                <button id="btn-restart" class="hud-btn" style="width:30px;height:30px;border-radius:5px;padding:0;margin-left:4px;" aria-label="Reiniciar">🔄</button>
            </div>
            <div class="hud-bottom">
                <div id="hud-weapon-selector" class="hud-weapon-selector">
                    <button id="wbtn-basic" class="w-btn" data-type="basic">⚽</button>
                    <button id="wbtn-fire" class="w-btn locked" data-type="fire" disabled>🔥</button>
                    <button id="wbtn-triple" class="w-btn locked" data-type="triple" disabled>🫓</button>
                    <button id="wbtn-guided" class="w-btn locked" data-type="guided" disabled>🧉</button>
                    <button id="wbtn-bomb" class="w-btn locked" data-type="bomb" disabled>🧨</button>
                    <button id="wbtn-megagol" class="w-btn locked" data-type="megagol" disabled>💣</button>
                </div>
                <div class="hud-garra-container">
                    <div class="hud-garra-bar">
                        <div id="hud-garra-fill" class="hud-garra-fill"></div>
                    </div>
                    <button id="btn-garra" class="hud-btn hud-btn-garra" aria-label="Activar Garra" disabled>⚡</button>
                </div>
            </div>
        </div>
        <div id="ad-container" class="ad-container hidden">
            <div class="ad-placeholder"><span>— PUBLICIDAD —</span></div>
        </div>

        <!-- Pause Menu Overlay -->
        <div id="pause-modal" class="modal hidden">
            <div class="modal-content pause-content">
                <h2 class="title-primary" style="font-size: 24px; margin-bottom: 30px; letter-spacing: 2px;">PAUSA</h2>
                <div class="menu-buttons">
                    <button id="pause-btn-resume" class="btn-primary">JUGAR</button>
                    <button id="pause-btn-controls" class="btn-secondary">CONTROLES</button>
                    <button id="pause-btn-mute" class="btn-secondary">SONIDO: ON</button>
                    <button id="pause-btn-home" class="btn-danger">INICIO</button>
                </div>
            </div>
        </div>
    </div>

    <!-- v=21: Menú de Pausa táctico, Mute, Inicio y corrección IA -->
    <script src="js/config.js?v=21"></script>
    <script src="js/input.js?v=21"></script>
    <script src="js/systems/pool.js?v=21"></script>
    <script src="js/systems/background.js?v=21"></script>
    <script src="js/systems/audio.js?v=21"></script>
    <script src="js/systems/weather.js?v=21"></script>
    <script src="js/systems/particle.js?v=21"></script>
    <script src="js/systems/collision.js?v=21"></script>
    <script src="js/systems/spawner.js?v=21"></script>
    <script src="js/data/weapons.js?v=21"></script>
    <script src="js/data/enemies.js?v=21"></script>
    <script src="js/data/powerups.js?v=21"></script>
    <script src="js/data/levels.js?v=21"></script>
    <script src="js/entities/bullet.js?v=21"></script>
    <script src="js/entities/enemy.js?v=21"></script>
    <script src="js/entities/boss.js?v=21"></script>
    <script src="js/entities/powerup.js?v=21"></script>
    <script src="js/entities/player.js?v=21"></script>
    <script src="js/renderer.js?v=21"></script>
    <script src="js/screens/menu.js?v=30"></script>
    <script src="js/screens/shop.js?v=30"></script>
    <script src="js/screens/levelSelect.js?v=30"></script>
    <script src="js/screens/comingSoon.js?v=30"></script>
    <script src="js/screens/facts.js?v=30"></script>
    <script src="js/screens/controls.js?v=21"></script>
    <script src="js/screens/gameOver.js?v=21"></script>
    <script src="js/screens/victory.js?v=21"></script>
    <script src="js/screens/hud.js?v=21"></script>
    <script src="js/main.js?v=21"></script>
</body>
</html>
